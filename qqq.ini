let currentLang = 'en';

function setLanguage(lang) {
  if (!translations[lang]) {
    console.warn('No translations for', lang);
    return;
  }
  currentLang = lang;

  // translate all elements with data-translate
  document.querySelectorAll('[data-translate]').forEach(el => {
    const key = el.getAttribute('data-translate');
    const value = translations[currentLang][key] ?? '';
    // if element has the boolean attribute data-translate-html -> use innerHTML (for icons etc.)
    if (el.hasAttribute('data-translate-html')) {
      el.innerHTML = value;
    } else {
      el.textContent = value;
    }
  });

  // placeholder example
  const userInput = document.getElementById('userInput');
  if (userInput) {
    userInput.placeholder = translations[currentLang]['chatbotPlaceholder'] ?? '';
  }

  // chat header example
  const chatbotHeader = document.querySelector('.chatbot-header');
  if (chatbotHeader) {
    chatbotHeader.textContent = translations[currentLang]['chatbotHeader'] ?? '';
  }

  // re-initialize (or update) welcome chat message
  const chatBody = document.getElementById('chatBody');
  if (chatBody) {
    const headerShort = (translations[currentLang]['chatbotHeader'] || '').split(' ')[0] || '';
    chatBody.innerHTML = `<div><strong>${headerShort}</strong> ${translations[currentLang]['chatbotInitialBot'] || ''}</div>`;
  }
}

// initialize on load
document.addEventListener('DOMContentLoaded', () => {
  setLanguage(currentLang);
});
